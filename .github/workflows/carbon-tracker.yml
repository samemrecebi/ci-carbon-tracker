name: CI with Carbon Tracking Test 1 (Linting and formatting)

on:
  pull_request:
  workflow_dispatch:

permissions:
  actions: read
  contents: write
  pull-requests: write
  issues: write

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./start
        with:
          electricitymaps-token: ${{ secrets.ELEC_MAPS }}

      - uses: astral-sh/ruff-action@v3
        with:
          src: >-
            start/tracker.py
            stop/report.py

      # Ruff Python linting
      - run: ruff check --fix

      # Ruff Python Formatting
      - run: ruff format

      - uses: ./stop
        if: always()
        with:
          pr-comment: "true"
