name: CI with Carbon Tracking

on:
  pull_request:
  workflow_dispatch:  # allows manual trigger from Actions tab

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./start

      - name: Build step (mock)
        run: |
          echo "Installing dependencies..."
          sleep 5
          echo "Compiling..."
          sleep 5

      - name: Test step (mock)
        run: |
          echo "Running tests..."
          sleep 5
          echo "All tests passed."

      - uses: ./stop
        if: always()
        with:
          pr-comment: "true"

    