name: "CI Carbon Tracker — Start"
description: "Start background energy tracking for this CI job"

inputs:
  python-version:
    description: "Python version to use"
    required: false
    default: "3.12"
  electricitymaps-token:
    description: "Electricity Maps API token for real-time carbon intensity data"
    required: false
    default: ""
  tracking-mode:
    description: "CodeCarbon tracking mode: 'machine' (whole runner) or 'process' (just your CI job)"
    required: false
    default: "machine"
  config-file:
    description: "Path to .cicarbon.json config file (relative to repo root)"
    required: false
    default: ".cicarbon.json"

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install dependencies
      shell: bash
      run: pip install "codecarbon>=3.2.3" "psutil>=5.9"

    - name: Start tracker in background
      shell: bash
      env:
        ELECTRICITYMAPS_TOKEN: ${{ inputs.electricitymaps-token }}
        TRACKING_MODE: ${{ inputs.tracking-mode }}
      run: |
        nohup python ${{ github.action_path }}/tracker.py --dir "$RUNNER_TEMP" --config "${{ inputs.config-file }}" > "$RUNNER_TEMP/tracker.log" 2>&1 &
        sleep 3
        if [ -f "$RUNNER_TEMP/tracker.pid" ]; then
          echo "Carbon tracker started (PID $(cat "$RUNNER_TEMP/tracker.pid"))"
        else
          echo "WARNING: tracker.pid not found after startup — check $RUNNER_TEMP/tracker.log"
          cat "$RUNNER_TEMP/tracker.log" 2>/dev/null || true
        fi
