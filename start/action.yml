name: "CI Carbon Tracker — Start"
description: "Start background energy tracking for this CI job"

inputs:
  python-version:
    description: "Python version to use"
    required: false
    default: "3.12"
  electricitymaps-token:
    description: "Electricity Maps API token for real-time carbon intensity data"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install dependencies
      shell: bash
      run: pip install "codecarbon>=3.2.3" "psutil>=5.9"

    - name: Start tracker in background
      shell: bash
      env:
        ELECTRICITYMAPS_TOKEN: ${{ inputs.electricitymaps-token }}
      run: |
        python ${{ github.action_path }}/tracker.py --dir "$RUNNER_TEMP" &
        sleep 2
        echo "Carbon tracker started"
