name: "CI Carbon Tracker — Stop"
description: "Stop tracking, generate report, optionally comment on PR"

inputs:
  pr-comment:
    description: "Post report as PR comment (true/false)"
    required: false
    default: "true"
  history-file:
    description: "Path to CSV history file (relative to repo root)"
    required: false
    default: "carbon-history.csv"

runs:
  using: "composite"
  steps:
    - name: Download previous history artifact
      uses: dawidd6/action-download-artifact@v6
      with:
        name: carbon-history
        path: ${{ runner.temp }}/history
        if_no_artifact_found: warn
        search_artifacts: true
        workflow_conclusion: ""

    - name: Restore previous history
      shell: bash
      run: |
        HISTORY_FILE="${{ inputs.history-file }}"
        if [ -f "$RUNNER_TEMP/history/$HISTORY_FILE" ]; then
          cp "$RUNNER_TEMP/history/$HISTORY_FILE" "$HISTORY_FILE"
          echo "[history] restored previous history"
        else
          echo "[history] no previous history found — first run"
        fi

    - name: Stop tracker and generate report
      shell: bash
      env:
        PR_NUMBER: ${{ github.event.pull_request.number }}
        BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
      run: |
        python ${{ github.action_path }}/report.py \
          --dir "$RUNNER_TEMP" \
          --markdown "$RUNNER_TEMP/carbon-report.md" \
          --history "${{ inputs.history-file }}"

    - name: Write job summary
      shell: bash
      run: cat "$RUNNER_TEMP/carbon-report.md" >> "$GITHUB_STEP_SUMMARY"

    - name: Upload history artifact
      uses: actions/upload-artifact@v4
      with:
        name: carbon-history
        path: ${{ inputs.history-file }}
        overwrite: true

    - name: Comment on PR
      if: ${{ inputs.pr-comment == 'true' && github.event_name == 'pull_request' }}
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        # Delete previous carbon tracker comment if it exists
        COMMENT_ID=$(gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
          --jq '.[] | select(.body | startswith("## CI Carbon Report")) | .id' 2>/dev/null || true)
        if [ -n "$COMMENT_ID" ]; then
          gh api -X DELETE "repos/${{ github.repository }}/issues/comments/$COMMENT_ID"
        fi
        gh pr comment "${{ github.event.pull_request.number }}" --body-file "$RUNNER_TEMP/carbon-report.md"
